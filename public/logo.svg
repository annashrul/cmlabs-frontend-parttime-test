<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Plate -->
  <ellipse cx="20" cy="28" rx="15" ry="5" fill="url(#plate)" opacity="0.15"/>
  <ellipse cx="20" cy="26.5" rx="13" ry="4" fill="none" stroke="url(#grad)" stroke-width="1.8"/>
  <ellipse cx="20" cy="26" rx="10" ry="2.8" fill="none" stroke="url(#grad)" stroke-width="0.8" opacity="0.4"/>

  <!-- Dome / cloche -->
  <path d="M8.5 26.5c0-8 5-14 11.5-14s11.5 6 11.5 14" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Handle knob -->
  <circle cx="20" cy="12.5" r="2.2" fill="none" stroke="url(#grad)" stroke-width="1.8"/>
  <circle cx="20" cy="12.5" r="0.8" fill="#F97316"/>

  <!-- Steam -->
  <path d="M16 8c0.3-1.5 1-3 1.8-3.8" stroke="#F97316" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <path d="M20 6.5c0.2-1.5 0.7-3 1.4-4" stroke="#F97316" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
  <path d="M24 8c-0.3-1.5-1-3-1.8-3.8" stroke="#F97316" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>

  <!-- Fork (left) -->
  <line x1="5.5" y1="18" x2="5.5" y2="35" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M4 18v-4.5M5.5 18v-4.5M7 18v-4.5" stroke="#F97316" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Knife (right) -->
  <line x1="34.5" y1="18" x2="34.5" y2="35" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <path d="M34.5 13.5c1.5 0.5 2 2 2 4v0.5h-2" stroke="#F97316" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" fill="none"/>

  <defs>
    <linearGradient id="grad" x1="8" y1="10" x2="32" y2="30">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="plate" x1="5" y1="26" x2="35" y2="32">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
